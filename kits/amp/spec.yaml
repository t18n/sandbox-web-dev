schemaVersion: "1"
kind: sandbox
name: amp
displayName: Amp
description: The frontier coding agent with full web development tooling.

sandbox:
  image: "ghcr.io/t18n/web-dev-sandbox:latest"
  aiFilename: AGENTS.md
  entrypoint:
    run: [amp, --dangerously-allow-all]

network:
  serviceDomains:
    ampcode.com: amp
  serviceAuth:
    amp:
      headerName: Authorization
      valueFormat: "Bearer %s"
  allowedDomains:
    - "ampcode.com:443"
    - "*.ampcode.com:443"
    - "*.npmjs.org:443"
    - "registry.npmjs.org:443"
    - "github.com:443"

commands:
  install:
    - command: "curl -fsSL https://ampcode.com/install.sh | bash"
      user: "1000"
      description: Install Amp

agentContext: |
  ## Sandbox environment

  You are running inside a Docker sandbox with a full web development
  environment. The workspace is mounted at its absolute host path.

  Available tooling:
  - Node.js 24, Python 3.12, Bun (managed by mise)
  - TypeScript, tsx, ESLint, Prettier, Biome
  - Playwright with Chromium, vitest
  - Docker and Docker Compose
  - psql, redis-cli, sqlite3

  `sudo` is passwordless. Docker is available inside the sandbox.
