schemaVersion: "1"
kind: sandbox
name: claude-code
displayName: Claude Code
description: Anthropic's Claude Code agent with full web development tooling.

sandbox:
  image: "ghcr.io/t18n/web-dev-sandbox:latest"
  aiFilename: CLAUDE.md
  entrypoint:
    run: [claude, --dangerously-skip-permissions]

network:
  serviceDomains:
    api.anthropic.com: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - "api.anthropic.com:443"
    - "statsig.anthropic.com:443"
    - "sentry.io:443"
    - "*.npmjs.org:443"
    - "registry.npmjs.org:443"
    - "github.com:443"

commands:
  install:
    - command: "npm install -g @anthropic-ai/claude-code"
      user: "1000"
      description: Install Claude Code

agentContext: |
  ## Sandbox environment

  You are running inside a Docker sandbox with a full web development
  environment. The workspace is mounted at its absolute host path.

  Available tooling:
  - Node.js 24, Python 3.12, Bun (managed by mise — `mise use` to switch)
  - TypeScript, tsx, ts-node
  - ESLint, Prettier, Biome
  - Playwright with Chromium
  - pnpm, yarn, npm, bun
  - Docker and Docker Compose
  - psql, redis-cli, sqlite3
  - bat, fzf, jq, yq, ripgrep

  `sudo` is passwordless; use it for package installs. Docker is available
  inside the sandbox; containers you start are isolated in the microVM.
