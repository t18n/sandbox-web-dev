schemaVersion: "1"
kind: sandbox
name: kiro
displayName: Kiro
description: AWS Kiro agent with full web development tooling.

sandbox:
  image: "ghcr.io/t18n/web-dev-sandbox:latest"
  entrypoint:
    run: [kiro]

network:
  allowedDomains:
    - "*.amazonaws.com:443"
    - "*.aws.amazon.com:443"
    - "cli.kiro.dev:443"
    - "*.kiro.dev:443"
    - "*.npmjs.org:443"
    - "registry.npmjs.org:443"
    - "github.com:443"

commands:
  install:
    - command: "curl -fsSL https://cli.kiro.dev/install | bash"
      user: "1000"
      description: Install Kiro

agentContext: |
  ## Sandbox environment

  You are running inside a Docker sandbox with a full web development
  environment. The workspace is mounted at its absolute host path.

  Available tooling:
  - Node.js 24, Python 3.12, Bun (managed by mise)
  - TypeScript, tsx, ESLint, Prettier, Biome
  - Playwright with Chromium, vitest
  - Docker and Docker Compose

  `sudo` is passwordless. Docker is available inside the sandbox.
