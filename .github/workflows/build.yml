name: Build and push template

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"  # Weekly rebuild to pick up tool updates
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/web-dev-sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "latest=${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          echo "sha=${{ env.IMAGE }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.latest }}
            ${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### Published template" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
